# ─────────────────────────────────────────────────────────────────────────────
#  YTChat TTS — Configuración principal
# ─────────────────────────────────────────────────────────────────────────────
#
#  Editar con Notepad. Reiniciar la aplicación para aplicar los cambios.
#  Si este archivo falta al arrancar, se recrea con los valores por defecto.
#
#  Los sonidos se configuran en un archivo aparte: sounds.ini
# ─────────────────────────────────────────────────────────────────────────────

# ─── Voz TTS (SAPI5) ────────────────────────────────────────────────────────
[voz]
# Puede ser un índice (0, 1, 2...) o parte del nombre (Helena, Zira, Sabina).
# Puedes ver el índice de tu voz en el selector de la aplicación.
voz = 0

# Velocidad en palabras por minuto aproximadas. Rango útil: 130 a 250.
velocidad = 175

# Volumen de la voz TTS (independiente del volumen del sistema y de sounds.ini).
# Rango: 0.0 (silencio) a 1.0 (máximo).
volumen = 1.0


# ─── Cola de mensajes pendientes de leer ────────────────────────────────────
[cola]
# Estrategia cuando la cola se llena:
#   todas  = leer todo en orden (puede acumularse mucho retraso)
#   limite = descartar los mensajes más viejos (recomendado)
estrategia = limite

# Máximo de mensajes en cola antes de empezar a descartar.
tamanio_maximo = 15

# Si la cola llega a N mensajes pendientes, leer solo el nombre del autor
# (sin el contenido) para avanzar más rápido. 0 = desactivado.
umbral_solo_nombre = 0


# ─── Reconexión automática ──────────────────────────────────────────────────
[reconexion]
# Si se pierde la conexión con YouTube, ¿reintentar automáticamente?
reconectar = true

# Segundos entre intentos de reconexión.
espera_entre_intentos = 10

# Máximo de reintentos antes de rendirse. 0 = sin límite.
max_intentos = 5


# ─── Formato de lectura ─────────────────────────────────────────────────────
[lectura]
# Qué se lee en voz alta para cada mensaje:
#   nombre_mensaje = "Juan: hola"    (por defecto)
#   solo_mensaje   = "hola"
#   solo_nombre    = "Juan"
formato_prefijo = nombre_mensaje


# ─── Filtros ────────────────────────────────────────────────────────────────
[filtros]
# Palabras que, si aparecen en un mensaje, harán que se omita (sin leerlo
# ni mostrarlo). Separadas por coma. Coincidencia parcial, sin distinguir
# mayúsculas. Ejemplo: palabras_silenciadas = spam, publicidad, http
palabras_silenciadas =

# Usuarios ignorados (coincidencia parcial, separados por coma).
# También se pueden silenciar en caliente desde el menú contextual del chat,
# pero esos silencios no se guardan en este archivo.
usuarios_silenciados =


# ─── Limpieza de texto ──────────────────────────────────────────────────────
[texto]
# Eliminar emojis antes de leer el mensaje (el TTS no los lee bien).
limpiar_emojis = true

# Eliminar URLs del texto leído (se seguirán mostrando en la lista).
eliminar_urls = true

# Truncar mensajes más largos que N caracteres. 0 = sin límite.
max_longitud_mensaje = 200


# ─── Atajos de teclado ──────────────────────────────────────────────────────
[atajos]
# Dos formatos admitidos:
#   alt+X  -> X es una letra, un dígito o uno de: , . ; ' [ ] / -
#   fN     -> una tecla de función de F1 a F12 (sin modificador)
# La navegación usa Alt (no choca con Insert de NVDA ni con Ctrl estándar);
# el control del TTS en tiempo real usa F5–F12. Para desactivar un atajo,
# deja el valor vacío. Si dos acciones comparten tecla, la segunda se ignora
# y se anota en ytchat.log.

# --- Navegación (Alt) ---
# Ir al campo URL/ID
url               = alt+u
# Conectar o desconectar del directo
conectar          = alt+c
# Saltar a la lista de chat
chat              = alt+l
# Saltar al selector de voz
voz               = alt+v
# Saltar al filtro de mensajes
filtro            = alt+f
# Aplicar la voz seleccionada
aplicar_voz       = alt+a
# Vaciar la cola de mensajes pendientes (sin detener el actual)
vaciar_cola       = alt+x
# Copiar el mensaje seleccionado
copiar_mensaje    = alt+k
# Copiar la línea completa (autor: mensaje, hora)
copiar_todo       = alt+o
# Releer con TTS el mensaje seleccionado
releer            = alt+r
# Abrir el primer enlace del mensaje seleccionado
abrir_enlace      = alt+e
# Cerrar la aplicación
salir             = alt+s

# --- Control del TTS en tiempo real (teclas de función) ---
# Pausar o reanudar el TTS
pausa             = f5
# Silenciar o reactivar la lectura TTS
silenciar_lectura = f6
# Silenciar o reactivar los sonidos de retroalimentación
silenciar_sonidos = f7
# Detener el mensaje en curso y vaciar la cola
detener_tts       = f8
# Disminuir velocidad del TTS
velocidad_menos   = f9
# Aumentar velocidad del TTS
velocidad_mas     = f10
# Disminuir volumen del TTS
volumen_menos     = f11
# Aumentar volumen del TTS
volumen_mas       = f12


# ─── Interfaz gráfica ───────────────────────────────────────────────────────
[ui]
# Tamaño de fuente para la lista de chat (puntos tipográficos).
# Valores típicos: 10 (denso), 11 (normal), 12 (cómodo), 14 (accesible).
tamanio_fuente_chat = 12

# Mostrar el total acumulado de Super Chats de la sesión en la barra de estado.
mostrar_total_superchats = true

# Filtro de mensajes activo al arrancar (se recuerda entre sesiones).
#   todos | texto | superchat | miembro
filtro_activo = todos

# Recordar si los sonidos quedaron silenciados (toggle con F7).
silenciar_sonidos = false


# ─── Sesión ─────────────────────────────────────────────────────────────────
[sesion]
# Guardar el historial del chat al cerrar la aplicación.
#   no     = no guardar (por defecto)
#   csv    = guardar como historial.csv (un archivo por sesión)
#   txt    = guardar como historial.txt (legible, sin metadatos)
guardar_historial = no

# Recordar si la lectura TTS quedó silenciada (toggle con F6).
silenciar_lectura = false

# ─────────────────────────────────────────────────────────────────────────────
#  YTChat TTS — Configuración de sonidos de retroalimentación
# ─────────────────────────────────────────────────────────────────────────────
#
#  Este archivo controla los sonidos cortos que la aplicación reproduce ante
#  ciertos eventos (conectar, nuevo mensaje, Super Chat, etc.). Se editan con
#  Notepad. Hay que reiniciar para aplicar los cambios.
#
#  La primera vez, si no existen los sonidos, ejecuta una vez:
#
#      python sound_gen.py
#
#  Se creará la carpeta del tema por defecto: sounds/themes/default/ con un
#  WAV por evento.
# ─────────────────────────────────────────────────────────────────────────────

[sonidos]
# Activar o desactivar TODO el sistema de sonidos
# true  = sonidos habilitados
# false = silencio total
activar = true

# Volumen global de los sonidos de retroalimentación.
# Rango 0.0 (silencio) a 1.0 (máximo). Es INDEPENDIENTE del volumen del TTS.
volumen = 0.7

# ─── Tema de sonido ─────────────────────────────────────────────────────────
# Un "tema" es una carpeta dentro de sounds/themes/ con un WAV por evento,
# nombrado igual que el evento (mensaje_nuevo.wav, superchat.wav, ...).
#
# Para crear tu propio tema:
#   1. Copia la carpeta  sounds/themes/default  a  sounds/themes/mi_tema
#   2. Reemplaza los .wav que quieras (mismo nombre de archivo).
#      Formato recomendado: WAV PCM 16-bit, 44100 Hz, breve (< 1 s).
#   3. Pon aquí el nombre de tu carpeta:
tema = default

# Eventos disponibles (por si creas un tema desde cero, estos son los nombres
# de archivo que debe contener la carpeta):
#   app_inicio, conectando, conectado, desconectado, mensaje_nuevo, superchat,
#   nuevo_miembro, error, pausa, reanudar, copiar, voz_cambiada,
#   enviado, comentario, moderacion, cola_vaciada

# ─── Overrides por evento (avanzado, opcional) ──────────────────────────────
# Puedes forzar un archivo concreto para un evento; tiene prioridad sobre el
# tema. Para SILENCIAR un evento, deja el valor vacío. Ejemplos:
#   superchat = C:\Sonidos\mi_campana.wav
#   copiar =

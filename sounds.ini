# ─────────────────────────────────────────────────────────────────────────────
#  YTChat TTS — Configuración de sonidos de retroalimentación
# ─────────────────────────────────────────────────────────────────────────────
#
#  Este archivo controla los sonidos cortos que la aplicación reproduce ante
#  ciertos eventos (conectar, nuevo mensaje, Super Chat, etc.). Se editan con
#  Notepad. Hay que reiniciar para aplicar los cambios.
#
#  La primera vez que ejecutes la aplicación, si no existe la carpeta
#  `sounds/`, ejecuta una vez:
#
#      python sound_gen.py
#
#  Se creará esa carpeta con un WAV para cada evento.
#
#  Si quieres usar tus propios sonidos, reemplaza los archivos WAV de la
#  carpeta `sounds/` manteniendo el mismo nombre, o cambia la ruta aquí.
#  Formato recomendado: WAV PCM 16-bit, mono o estéreo, 44100 Hz, breve
#  (menos de un segundo). El reproductor tolera otros formatos, pero estos
#  son los que arrancan sin latencia perceptible.
# ─────────────────────────────────────────────────────────────────────────────

[sonidos]
# Activar o desactivar TODO el sistema de sonidos
# true  = sonidos habilitados
# false = silencio total
activar = true

# Volumen global de los sonidos de retroalimentación.
# Rango 0.0 (silencio) a 1.0 (máximo). Es INDEPENDIENTE del volumen del TTS.
volumen = 0.7

# ─── Mapeo de eventos a archivos WAV ────────────────────────────────────────
# Las rutas son relativas a la carpeta del programa (o absolutas si quieres).
# Para desactivar un sonido concreto, deja el valor vacío: `superchat =`
# Para usar tu propio archivo: `superchat = C:\Sonidos\mi_campana.wav`

app_inicio     = sounds/app_inicio.wav
conectando     = sounds/conectando.wav
conectado      = sounds/conectado.wav
desconectado   = sounds/desconectado.wav
mensaje_nuevo  = sounds/mensaje.wav
superchat      = sounds/superchat.wav
nuevo_miembro  = sounds/miembro.wav
error          = sounds/error.wav
pausa          = sounds/pausa.wav
reanudar       = sounds/reanudar.wav
copiar         = sounds/copiar.wav
voz_cambiada   = sounds/voz_cambiada.wav
